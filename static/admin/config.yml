backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

local_backend: true

media_folder: "static/assets"
public_folder: "/assets"

collections:
  - name: "posts"
    label: "Essays"
    label_singular: "Essay"
    folder: "src/content/posts"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{year}}/{{month}}/{{day}}"
    create: true
    fields:
      - { label: "Template", name: "template", widget: "hidden", default: "blog-post" }
      - { label: "Artifact ID", name: "artifactId", widget: "string", required: false, hint: "Example: Essay. 05" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Start with /. Example: /my-essay" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", format: "YYYY-MM-DD HH:mm" }
      - { label: "SEO Description", name: "description", widget: "text", required: false }
      - { label: "Card Summary", name: "summary", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - label: "Pages"
    name: "pages"
    files:
      - label: "Home"
        name: "home"
        file: "src/content/pages/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Portrait Image", name: "portraitImage", widget: "image" }
          - { label: "Portrait Caption", name: "portraitCaption", widget: "string" }
          - label: "Primary CTA"
            name: "primaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Secondary CTA"
            name: "secondaryCta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Metadata Strip"
            name: "metadata"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "Mode Cards"
            name: "modes"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Bio"
        name: "bio"
        file: "src/content/pages/bio.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Opening Quote", name: "quote", widget: "text" }
          - label: "Metadata Bar"
            name: "metadata"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "Figure"
            name: "figure"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Caption", name: "caption", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "src/content/pages/contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

  - label: "Artifact Modes"
    name: "artifact_modes"
    files:
      - label: "Labs"
        name: "labs"
        file: "src/content/artifacts/labs.json"
        fields: &artifact_mode_fields
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Navigation Title", name: "navTitle", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Summary", name: "summary", widget: "text" }
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
      - label: "Studio"
        name: "studio"
        file: "src/content/artifacts/studio.json"
        fields: *artifact_mode_fields
      - label: "Workshop"
        name: "workshop"
        file: "src/content/artifacts/workshop.json"
        fields: *artifact_mode_fields

  - name: "settings"
    label: "Settings"
    files:
      - name: "general"
        label: "General"
        file: "src/util/site.json"
        fields:
          - label: "Meta"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Site Title", name: "title", widget: "string", required: true }
              - { label: "Title Template", name: "titleTemplate", widget: "string", default: "%s", required: true }
              - { label: "Website URL", name: "siteUrl", widget: "string", required: true }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Default Social Image", name: "image", widget: "image" }
              - { label: "Favicon Image", name: "iconimage", widget: "image" }
              - { label: "Twitter Username", name: "twitterUsername", widget: "string", required: false }
          - { label: "Google Analytics", name: "ga", widget: "string", required: false }
